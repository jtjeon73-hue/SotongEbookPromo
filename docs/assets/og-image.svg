<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1B2D"/>
      <stop offset="50%" style="stop-color:#2C3E50"/>
      <stop offset="100%" style="stop-color:#0F1B2D"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A962"/>
      <stop offset="100%" style="stop-color:#E8D5A3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative elements -->
  <circle cx="1050" cy="120" r="180" fill="#C9A962" opacity="0.06"/>
  <circle cx="150" cy="520" r="120" fill="#C9A962" opacity="0.04"/>
  <line x1="80" y1="580" x2="1120" y2="580" stroke="#C9A962" stroke-width="1" opacity="0.3"/>

  <!-- Book icon -->
  <g transform="translate(900, 180)" filter="url(#shadow)">
    <rect x="0" y="0" width="160" height="220" rx="8" fill="#1A2332" stroke="#C9A962" stroke-width="2" opacity="0.9"/>
    <rect x="20" y="20" width="120" height="8" rx="2" fill="#C9A962" opacity="0.6"/>
    <rect x="20" y="40" width="100" height="6" rx="2" fill="#F5F0E8" opacity="0.3"/>
    <rect x="20" y="55" width="110" height="6" rx="2" fill="#F5F0E8" opacity="0.25"/>
    <rect x="20" y="70" width="90" height="6" rx="2" fill="#F5F0E8" opacity="0.2"/>
    <rect x="20" y="85" width="105" height="6" rx="2" fill="#F5F0E8" opacity="0.2"/>
    <path d="M 80 120 L 80 180 M 50 150 L 110 150" stroke="#C9A962" stroke-width="3" fill="none" opacity="0.5"/>
  </g>

  <!-- Gold accent bar -->
  <rect x="80" y="200" width="60" height="4" rx="2" fill="url(#gold)"/>

  <!-- Main title -->
  <text x="80" y="260" font-family="Georgia, 'Noto Serif KR', serif" font-size="56" font-weight="700" fill="#FFFFFF">
    îÁÞ┤ ÉE
  </text>

  <!-- English subtitle -->
  <text x="80" y="320" font-family="Arial, sans-serif" font-size="28" font-weight="500" fill="#E8D5A3" letter-spacing="2">
    Sotong Ebook Lab
  </text>

  <!-- Tagline -->
  <text x="80" y="380" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" fill="#F5F0E8" opacity="0.85">
    Digital Ebook À PDF Guide À AI Knowledge
  </text>

  <!-- Bottom badges -->
  <g transform="translate(80, 440)">
    <rect x="0" y="0" width="130" height="36" rx="18" fill="#FFFFFF" opacity="0.08" stroke="#C9A962" stroke-width="1" stroke-opacity="0.4"/>
    <text x="65" y="24" font-family="Arial, sans-serif" font-size="13" fill="#F5F0E8" text-anchor="middle">Digital Ebook</text>

    <rect x="145" y="0" width="110" height="36" rx="18" fill="#FFFFFF" opacity="0.08" stroke="#C9A962" stroke-width="1" stroke-opacity="0.4"/>
    <text x="200" y="24" font-family="Arial, sans-serif" font-size="13" fill="#F5F0E8" text-anchor="middle">PDF Guide</text>

    <rect x="270" y="0" width="120" height="36" rx="18" fill="#FFFFFF" opacity="0.08" stroke="#C9A962" stroke-width="1" stroke-opacity="0.4"/>
    <text x="330" y="24" font-family="Arial, sans-serif" font-size="13" fill="#F5F0E8" text-anchor="middle">AI Knowledge</text>
  </g>
</svg>
