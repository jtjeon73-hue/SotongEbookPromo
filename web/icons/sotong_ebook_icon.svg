<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="900" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3559C7"/>
      <stop offset="45%" stop-color="#16233A"/>
      <stop offset="100%" stop-color="#0F1B2D"/>
    </linearGradient>
    <linearGradient id="pageL" x1="220" y1="260" x2="470" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFDF6"/>
      <stop offset="100%" stop-color="#FFF8E7"/>
    </linearGradient>
    <linearGradient id="pageR" x1="554" y1="260" x2="804" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="100%" stop-color="#F4E8C8"/>
    </linearGradient>
    <linearGradient id="sFill" x1="360" y1="300" x2="680" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7656D8"/>
      <stop offset="55%" stop-color="#3559C7"/>
      <stop offset="100%" stop-color="#20B8A6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0B1526" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- App icon rounded square -->
  <rect x="48" y="48" width="928" height="928" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Soft inner panel -->
  <rect x="140" y="140" width="744" height="744" rx="168" ry="168" fill="#0A1628" fill-opacity="0.22"/>

  <!-- Open ebook -->
  <g filter="url(#soft)">
    <!-- Left page -->
    <path d="M210 292 C210 272 226 258 246 258 H470 C492 258 510 276 510 298 V732 C510 754 492 772 470 772 H246 C226 772 210 758 210 738 Z" fill="url(#pageL)"/>
    <!-- Right page -->
    <path d="M514 298 C514 276 532 258 554 258 H778 C798 258 814 272 814 292 V738 C814 758 798 772 778 772 H554 C532 772 514 754 514 732 Z" fill="url(#pageR)"/>
    <!-- Spine -->
    <rect x="498" y="250" width="28" height="530" rx="10" fill="#7656D8"/>
    <rect x="505" y="262" width="14" height="506" rx="6" fill="#F2B84B" fill-opacity="0.85"/>
  </g>

  <!-- Page lines (digital page / docs) -->
  <g stroke="#D8C7A1" stroke-width="14" stroke-linecap="round" opacity="0.75">
    <path d="M278 370 H430"/>
    <path d="M278 422 H406"/>
    <path d="M278 474 H418"/>
    <path d="M278 526 H392"/>
    <path d="M594 370 H746"/>
    <path d="M594 422 H722"/>
    <path d="M594 474 H734"/>
    <path d="M594 526 H708"/>
  </g>

  <!-- Abstract S over center -->
  <path fill="url(#sFill)" d="M652 340 C652 292 612 264 518 264 C404 264 360 312 360 372 C360 430 404 456 518 482 C620 506 672 534 672 616 C672 714 610 772 482 772 C380 772 326 732 308 666 L388 636 C402 676 436 708 482 708 C560 708 584 672 584 626 C584 578 550 556 460 534 C348 508 280 470 280 372 C280 272 358 200 518 200 C666 200 732 260 732 340 Z"/>

  <!-- Document pixels -->
  <g fill="#20B8A6">
    <rect x="286" y="620" width="36" height="36" rx="8"/>
    <rect x="334" y="620" width="36" height="36" rx="8" opacity="0.7"/>
    <rect x="654" y="620" width="36" height="36" rx="8"/>
    <rect x="702" y="620" width="36" height="36" rx="8" opacity="0.7"/>
  </g>

  <!-- AI spark / pen tip -->
  <g fill="#F2B84B">
    <circle cx="752" cy="300" r="18"/>
    <path d="M752 250 L760 286 L796 294 L760 302 L752 338 L744 302 L708 294 L744 286 Z"/>
  </g>
  <circle cx="272" cy="312" r="12" fill="#20B8A6"/>
  <circle cx="300" cy="288" r="8" fill="#F2B84B" opacity="0.9"/>
</svg>
